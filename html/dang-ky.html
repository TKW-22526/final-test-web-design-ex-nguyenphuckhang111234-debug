<body>

    <!--=========================

    <header>

        <h1>ĐẶC SẢN SÓC TRĂNG</h1>

        <nav>

            <a href="../index.html">Trang chủ</a>

            <a href="gioi-thieu.html">Giới thiệu</a>

                Đăng nhập

            </a>

        </nav>

    </header>


    <!--=========================
            ĐĂNG KÝ
    =========================-->

    <main>

        <section class="dangKy">

            <h2>

                ĐĂNG KÝ TÀI KHOẢN

            </h2>

            <form id="formDangKy">

                <div>

                    <label>Họ và tên</label>

                    <input
                        type="text"
                        id="hoTen"
                        placeholder="Nhập họ và tên"
                        required>

                </div>

                <br>

                <div>

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="Nhập email"
                        required>

                </div>

                <br>

                <div>

                    <label>Mật khẩu</label>

                    <input
                        type="password"
                        id="matKhau"
                        placeholder="Nhập mật khẩu"
                        required>

                </div>

                <br>

                <div>

                    <label>Nhập lại mật khẩu</label>

                    <input
                        type="password"
                        id="nhapLaiMatKhau"
                        placeholder="Nhập lại mật khẩu"
                        required>

                </div>

                <br>

                <button type="submit">

                    Đăng ký

                </button>

            </form>

            <br>

            <p>

                Đã có tài khoản?

                <a href="dang-nhap.html">

                    Đăng nhập ngay

                </a>

            </p>

        </section>

    </main>
